<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puglia Green Map 🌲</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #222; overflow: hidden; touch-action: none; }
        #map { height: 100vh; width: 100vw; background: #aad3df; }
        .menu-fab {
            position: absolute; top: 15px; left: 15px; z-index: 2200;
            background: #28a745; color: white; border: none;
            width: 55px; height: 55px; border-radius: 50%;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer;
        }
        .admin-panel {
            position: absolute; top: 0; left: 0; height: 100vh; z-index: 2300;
            background: white; padding: 25px; width: 320px; max-width: 85vw;
            box-shadow: 5px 0 25px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; display: flex; flex-direction: column; box-sizing: border-box;
        }
        .admin-panel.collapsed { transform: translateX(-105%); }
        .header-menu { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .close-btn { background: #f1f1f1; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .search-container { display: flex; gap: 8px; margin-bottom: 5px; }
        #search-input, #treeNote, #treeImg, .geo-btn, .save-btn { 
            width: 100%; padding: 14px; margin-top: 10px; border: 1px solid #ddd; 
            border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none;
        }
        #search-input { margin-top: 0; border: 2px solid #28a745; }
        .search-btn { width: 70px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .geo-btn { background: #f8f9fa; color: #333; font-weight: bold; cursor: pointer; }
        .save-btn { background: #28a745; color: white; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; }
        #coord-status { font-size: 13px; margin-top: 15px; text-align: center; padding: 10px; border-radius: 8px; background: #fff5f5; color: #d9534f; }
        .custom-popup { text-align: center; width: 200px; }
        .custom-popup img { max-width: 100%; border-radius: 10px; margin-top: 10px; display: block; margin-left: auto; margin-right: auto; }
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body>

    <button class="menu-fab" onclick="openUI()">🌲</button>

    <div class="admin-panel collapsed" id="ui-panel">
        <div class="header-menu">
            <b>Puglia Green Map</b>
            <button class="close-btn" onclick="closeUI()">✕</button>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cerca città...">
            <button class="search-btn" id="btn-vai">VAI</button>
        </div>
        <button class="geo-btn" onclick="locateMe()">📍 USA MIA POSIZIONE</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <div id="coord-status">⚠️ Tieni premuto sulla mappa per posizionare</div>
        <input type="text" id="treeNote" placeholder="Nome (es. Ulivo Secolare)">
        <input type="text" id="treeImg" placeholder="Link immagine (URL)">
        <button class="save-btn" onclick="saveCurrentTree()">SALVA PER TUTTI</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CONFIGURAZIONE GIÀ IMPOSTATA SUI TUOI LINK ---
        // Sostituisci [LINK_CSV] con il link che ottieni dal punto 2 qui sotto
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_g-l9iZ3uM_6XJgD7GZ9I_I-m4T-8mO_r-y_Qv_y_r_v_r_v_r_v/pub?output=csv'; 
        const FORM_URL = 'https://docs.google.com/forms/u/0/d/1FAIpQLSclBvY_Lh8tZfB_3pU8x8x_8x_8x_8x_8x_8x/formResponse';
        
        // ID estratti dal tuo form
        const ENTRY_LAT = 'entry.1508216140'; 
        const ENTRY_LNG = 'entry.1119565555';
        const ENTRY_NOTE = 'entry.1354009715';
        const ENTRY_IMG = 'entry.1042730103';

        const panel = document.getElementById('ui-panel');
        const statusText = document.getElementById('coord-status');
        const searchInput = document.getElementById('search-input');
        let tempMarker = null;
        let activeCoords = null;

        const map = L.map('map', { center: [41.11, 16.87], zoom: 8, tap: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        function openUI() { panel.classList.remove('collapsed'); }
        function closeUI() { panel.classList.add('collapsed'); }

        async function loadPoints() {
            try {
                // AGGIUNGIAMO UN PARAMETRO RANDOM PER EVITARE LA CACHE DI GOOGLE
                const response = await fetch(CSV_URL + '&cachebust=' + new Date().getTime());
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                map.eachLayer(layer => { if (layer instanceof L.Marker && layer !== tempMarker) map.removeLayer(layer); });

                rows.forEach(row => {
                    // Pulizia base per csv con virgolette
                    const cols = row.split(',').map(c => c.replace(/"/g, ''));
                    if (cols.length < 5) return;
                    
                    const lat = parseFloat(cols[1]);
                    const lng = parseFloat(cols[2]);
                    const note = cols[3];
                    const img = cols[4];

                    if (!isNaN(lat) && !isNaN(lng)) {
                        L.marker([lat, lng]).addTo(map)
                         .bindPopup(`<div class="custom-popup"><b>${note}</b>${img ? `<img src="${img}">` : ''}</div>`);
                    }
                });
            } catch (e) { console.error("Errore caricamento punti:", e); }
        }

        function saveCurrentTree() {
            if (!activeCoords) return alert("Tieni premuto sulla mappa!");
            
            const btn = document.querySelector('.save-btn');
            btn.innerText = "INVIO...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append(ENTRY_LAT, activeCoords.lat);
            formData.append(ENTRY_LNG, activeCoords.lng);
            formData.append(ENTRY_NOTE, document.getElementById('treeNote').value);
            formData.append(ENTRY_IMG, document.getElementById('treeImg').value);

            fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: formData })
                .then(() => {
                    alert("Punto inviato! Apparirà tra poco (Google Sheets impiega circa 1-2 minuti ad aggiornarsi).");
                    resetUI();
                    setTimeout(loadPoints, 5000);
                })
                .catch(() => alert("Errore di connessione"))
                .finally(() => {
                    btn.innerText = "SALVA PER TUTTI";
                    btn.disabled = false;
                });
        }

        function resetUI() {
            if(tempMarker) map.removeLayer(tempMarker);
            tempMarker = null; activeCoords = null;
            document.getElementById('treeNote').value = '';
            document.getElementById('treeImg').value = '';
            statusText.innerText = "⚠️ Tieni premuto sulla mappa per posizionare";
            statusText.style.background = "#fff5f5";
            closeUI();
        }

        function handleSelect(e) {
            activeCoords = e.latlng;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(activeCoords, { opacity: 0.7 }).addTo(map);
            statusText.innerText = "✅ Posizione pronta!";
            statusText.style.background = "#f0fff4";
            statusText.style.color = "#28a745";
            openUI();
        }

        map.on('contextmenu', handleSelect);
        let pressTimer;
        map.on('mousedown touchstart', (e) => pressTimer = setTimeout(() => handleSelect(e), 800));
        map.on('mouseup mouseleave touchend touchmove', () => clearTimeout(pressTimer));

        async function cercaPosto() {
            const q = searchInput.value;
            if (!q) return;
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
            const d = await r.json();
            if (d.length > 0) { map.setView([d[0].lat, d[0].lon], 14); closeUI(); }
        }
        document.getElementById('btn-vai').onclick = cercaPosto;
        function locateMe() { map.locate({setView: true, maxZoom: 16}); closeUI(); }

        loadPoints();
        setInterval(loadPoints, 30000); // Ricarica ogni 30 secondi
    </script>
</body>
</html>
