<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puglia Green Map 🌲</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Stili Base */
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #222; overflow: hidden; touch-action: none; }
        #map { height: 100vh; width: 100vw; background: #aad3df; }
        
        /* Pulsante Menu */
        .menu-fab {
            position: absolute; top: 15px; left: 15px; z-index: 2200;
            background: #28a745; color: white; border: none;
            width: 55px; height: 55px; border-radius: 50%;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer;
            transition: transform 0.2s;
        }
        .menu-fab:active { transform: scale(0.9); }

        /* Pannello Laterale */
        .admin-panel {
            position: absolute; top: 0; left: 0; height: 100vh; z-index: 2300;
            background: white; padding: 25px; width: 320px; max-width: 85vw;
            box-shadow: 5px 0 25px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; display: flex; flex-direction: column; box-sizing: border-box;
        }
        .admin-panel.collapsed { transform: translateX(-105%); }

        .header-menu { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .close-btn { background: #f1f1f1; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Form */
        .search-container { display: flex; gap: 8px; margin-bottom: 5px; }
        #search-input, #treeNote, #treeImg, .geo-btn, .save-btn { 
            width: 100%; padding: 14px; margin-top: 10px; border: 1px solid #ddd; 
            border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none;
        }
        #search-input { margin-top: 0; border: 2px solid #28a745; }
        .search-btn { width: 70px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .geo-btn { background: #f8f9fa; color: #333; font-weight: bold; cursor: pointer; border: 1px solid #ddd; }
        .save-btn { background: #28a745; color: white; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(40,167,69,0.3); }

        #coord-status { font-size: 13px; margin-top: 15px; text-align: center; padding: 10px; border-radius: 8px; background: #fff5f5; color: #d9534f; transition: all 0.3s; }

        /* Popup */
        .custom-popup { text-align: center; width: 200px; padding: 5px; }
        .custom-popup img { max-width: 100%; border-radius: 10px; margin-top: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body>

    <button class="menu-fab" onclick="openUI()">🌲</button>

    <div class="admin-panel collapsed" id="ui-panel">
        <div class="header-menu">
            <b style="font-size: 1.2em;">Puglia Green Map</b>
            <button class="close-btn" onclick="closeUI()">✕</button>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cerca città o via...">
            <button class="search-btn" id="btn-vai">VAI</button>
        </div>
        
        <button class="geo-btn" onclick="locateMe()">📍 USA MIA POSIZIONE</button>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <div id="coord-status">⚠️ Tieni premuto sulla mappa per aggiungere un punto</div>
        
        <input type="text" id="treeNote" placeholder="Nome o nota (es. Ulivo)">
        <input type="text" id="treeImg" placeholder="Link immagine (URL)">
        
        <button class="save-btn" onclick="saveCurrentTree()">SALVA IN MAPPA</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CONFIGURAZIONE ---
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuyT4fM1SjsDwY2zWbNo8cNxnj8roA_snL_C83Bslyo8YM62KPFs7X2SHmxPad959yfbJG1L1HJofb/pub?gid=1652944660&single=true&output=csv';
        const FORM_URL = 'https://docs.google.com/forms/u/0/d/e/1FAIpQLSclBvY_Lh8tZfB_3pU8x8x_8x_8x_8x_8x_8x_8x/formResponse'; // Assicurati che questo URL sia corretto (/formResponse finale)
        
        // Sostituisci questi con i tuoi entry ID reali dal form
        const ENTRY_LAT = 'entry.1508216140'; 
        const ENTRY_LNG = 'entry.1119565555';
        const ENTRY_NOTE = 'entry.1354009715';
        const ENTRY_IMG = 'entry.1042730103';

        const panel = document.getElementById('ui-panel');
        const statusText = document.getElementById('coord-status');
        const searchInput = document.getElementById('search-input');
        
        let tempMarker = null;
        let activeCoords = null;

        // Inizializzazione Mappa
        const map = L.map('map', { center: [41.11, 16.87], zoom: 8, tap: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        function openUI() { panel.classList.remove('collapsed'); }
        function closeUI() { panel.classList.add('collapsed'); }

        // --- CARICAMENTO PUNTI ---
        async function loadPoints() {
            try {
                // Aggiungiamo un timestamp per forzare l'aggiornamento dei dati (no cache)
                const resp = await fetch(CSV_URL + '&t=' + new Date().getTime());
                const csvData = await resp.text();
                const lines = csvData.split('\n').slice(1); // Rimuove intestazione

                // Rimuove marker esistenti (tranne quello temporaneo)
                map.eachLayer(layer => {
                    if (layer instanceof L.Marker && layer !== tempMarker) map.removeLayer(layer);
                });

                lines.forEach(line => {
                    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length < 3) return;

                    // Struttura CSV Google: [0]Timestamp, [1]Lat, [2]Lng, [3]Nota, [4]Img
                    const lat = parseFloat(cols[1]);
                    const lng = parseFloat(cols[2]);
                    const note = cols[3] || "Albero";
                    const img = cols[4] || "";

                    if (!isNaN(lat) && !isNaN(lng)) {
                        L.marker([lat, lng]).addTo(map)
                         .bindPopup(`
                            <div class="custom-popup">
                                <strong>${note}</strong><br>
                                ${img ? `<img src="${img}" onerror="this.style.display='none'">` : ''}
                            </div>
                         `);
                    }
                });
            } catch (err) { console.error("Errore caricamento:", err); }
        }

        // --- SALVATAGGIO ---
        function saveCurrentTree() {
            if (!activeCoords) {
                alert("Tieni premuto sulla mappa per scegliere la posizione!");
                return;
            }

            const note = document.getElementById('treeNote').value;
            const img = document.getElementById('treeImg').value;
            const btn = document.querySelector('.save-btn');

            btn.innerText = "INVIO IN CORSO...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append(ENTRY_LAT, activeCoords.lat);
            formData.append(ENTRY_LNG, activeCoords.lng);
            formData.append(ENTRY_NOTE, note);
            formData.append(ENTRY_IMG, img);

            // Invio al Google Form
            fetch(FORM_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                alert("Inviato con successo! Il punto apparirà tra un minuto.");
                resetForm();
                setTimeout(loadPoints, 3000);
            }).catch(err => {
                alert("Errore nell'invio.");
                console.error(err);
            }).finally(() => {
                btn.innerText = "SALVA IN MAPPA";
                btn.disabled = false;
            });
        }

        function resetForm() {
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = null;
            activeCoords = null;
            document.getElementById('treeNote').value = '';
            document.getElementById('treeImg').value = '';
            statusText.innerText = "⚠️ Tieni premuto sulla mappa per aggiungere un punto";
            statusText.style.background = "#fff5f5";
            statusText.style.color = "#d9534f";
            closeUI();
        }

        // --- GESTIONE TOUCH/MOUSE ---
        function onMapHold(e) {
            activeCoords = e.latlng;
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(activeCoords, { opacity: 0.8 }).addTo(map);
            statusText.innerText = "✅ Posizione selezionata!";
            statusText.style.background = "#f0fff4";
            statusText.style.color = "#28a745";
            openUI();
        }

        map.on('contextmenu', onMapHold); // Tasto destro PC
        
        let pressTimer;
        map.on('mousedown touchstart', (e) => {
            pressTimer = window.setTimeout(() => onMapHold(e), 800);
        });
        map.on('mouseup mouseleave touchend touchmove', () => clearTimeout(pressTimer));

        // --- RICERCA E GPS ---
        async function cercaPosto() {
            const query = searchInput.value;
            if (!query) return;
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const d = await r.json();
                if (d.length > 0) { map.setView([d[0].lat, d[0].lon], 14); closeUI(); }
                else { alert("Luogo non trovato"); }
            } catch (e) { alert("Errore di rete"); }
        }
        document.getElementById('btn-vai').addEventListener('click', cercaPosto);
        function locateMe() { map.locate({setView: true, maxZoom: 16}); closeUI(); }

        // Avvio
        loadPoints();
        setInterval(loadPoints, 60000); // Aggiorna ogni minuto
    </script>
</body>
</html>
